name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q

      - name: Demo run (end-to-end offline)
        run: python -m anvil.cli demo /tmp/anvil-ci-run

      - name: Audit ledger
        run: python -m anvil.cli audit /tmp/anvil-ci-run

      - name: Verify channel integrity
        run: python -m anvil.cli verify-logs /tmp/anvil-ci-run
